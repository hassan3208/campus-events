<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>

  <!-- Use the same CSS file/path as index.html -->
  <link rel="stylesheet" href="../styles/style.css" />

  <style>
    .gallery-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .gallery-section h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .gallery-section p {
      text-align: center;
      margin-bottom: 30px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .gallery-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .gallery-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .gallery-card h3 {
      font-size: 18px;
      margin: 15px 15px 8px;
    }

    .gallery-card p {
      text-align: left;
      margin: 0 15px 15px;
      font-size: 14px;
    }
  </style>
</head>
